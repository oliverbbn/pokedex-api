<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UFT-8">
    <title>Pokédex API</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark text-white p-8">
    <div class="container text-center" style="max-width: 600px;">
        <h1 class="text-warning mb-10">Pokédex Hunter</h1>

        <input type="text" id="in-pokemon" class="form-control mb-2" placeholder="Digite o nome (ex: pikachu) ou número...">
        <button onclick="buscarPokemon()" class="btn btn-danger w-100 mb-2 p-2">Buscar no Servidor</button>
        <div id="tela-resultado" class="card bg-secondary text-white mb-2 p-2 shadow">
        <p>Aguardando busca...</p>
        </div>
</div>
<script>
        let pokemonAtual = null;

    // A palavra 'async' avisa o navegador:"Essa função vai demorar, não trave a tela!"
    async function buscarPokemon(){
        let pokemonDigitado=document.getElementById('in-pokemon').value.toLowerCase();
        let urlApi=`https://pokeapi.co/api/v2/pokemon/${pokemonDigitado}`;

        // O 'await' faz o código pausar NESSA linha até o servidor responder
        let resposta = await fetch(urlApi);
        if(resposta.ok === false){
            pokemonDigitado.innerHTML = `
            <h3 class="text-danger w-100 mb-2 p-2">Pokémon não encontrado!</h3>
            `
            return;
        } else{
            resposta.ok;
        }

        // A resposta vem criptografada da internet. Precisamos traduzir para JSON!
        let dadosJson = await resposta.json();

        // Vamos ver os dados puros no console (f12) antes de desenhar a tela
        console.log(dadosJson);

        desenharNaTela(dadosJson);
        }
  
        pokemonAtual = dadosJson;
    function desenharNaTela(dados){
        let tela=document.getElementById('tela-resultado');

        // Usamos as crases (``) para injetar as variáveis do JSON.
        // A PokeAPI guarda a foto no caminho: sprites.front_default
        tela.innerHTML = `
        <h3>${dados.name.toUpperCase()}</h3>
        <img src="${dados.sprites.front_default}" alt="Foto do Pokemon" width="200" id="foto-poke">
        <p><strong>Peso: </strong>${dados.weight/10} kg</p>
        <p>"${dados.types[0].type.name}"</p>
        <button onclick="mudarParaShiny()" class="btn btn-warning w-100 mb-2 p-2">Ver versão Shiny</button>
        `
       
    }
    function mudarParaShiny(){
        let id=document.getElementById('src');
        id.innerHTML=`
        <img src ="${pokemonAtual.sprites.front_shiny}" alt="Foto do Pokemon" width="200">
        `
    }
</script>
</body>

</html>
